<svg width="420" height="440" viewBox="0 0 420 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f75c7e"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#141a26"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="420" height="440" rx="16" fill="url(#bgGlow)"/>
  <rect x="1" y="1" width="418" height="438" rx="15" fill="none" stroke="#2a3040" stroke-width="1.5"/>

  <!-- title -->
  <text x="210" y="34" text-anchor="middle" font-family="Segoe UI, Ubuntu, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">🤖 Multi-Agent System</text>
  <text x="210" y="52" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#7d8590">orchestrate → delegate → collaborate</text>

  <!-- connection lines (animated data flow) -->
  <g stroke="#f75c7e" stroke-width="1.6" fill="none" opacity="0.55">
    <path id="l1" d="M 210 218 L 90 120"/>
    <path id="l2" d="M 210 218 L 330 120"/>
    <path id="l3" d="M 210 218 L 68 300"/>
    <path id="l4" d="M 210 218 L 352 300"/>
    <path id="l5" d="M 210 218 L 210 372"/>
  </g>
  <g stroke="#a855f7" stroke-width="1.6" fill="none" stroke-dasharray="5 7" opacity="0.9">
    <path d="M 210 218 L 90 120">
      <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 210 218 L 330 120">
      <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.9s" repeatCount="indefinite"/>
    </path>
    <path d="M 210 218 L 68 300">
      <animate attributeName="stroke-dashoffset" from="0" to="48" dur="1.7s" repeatCount="indefinite"/>
    </path>
    <path d="M 210 218 L 352 300">
      <animate attributeName="stroke-dashoffset" from="0" to="48" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M 210 218 L 210 372">
      <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- traveling packets -->
  <circle r="3.5" fill="#f75c7e" filter="url(#softGlow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M 210 218 L 90 120"/>
  </circle>
  <circle r="3.5" fill="#58a6ff" filter="url(#softGlow)">
    <animateMotion dur="1.9s" repeatCount="indefinite" path="M 330 120 L 210 218"/>
  </circle>
  <circle r="3.5" fill="#a855f7" filter="url(#softGlow)">
    <animateMotion dur="1.7s" repeatCount="indefinite" path="M 210 218 L 68 300"/>
  </circle>
  <circle r="3.5" fill="#3fb950" filter="url(#softGlow)">
    <animateMotion dur="2.1s" repeatCount="indefinite" path="M 352 300 L 210 218"/>
  </circle>
  <circle r="3.5" fill="#f0883e" filter="url(#softGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 210 218 L 210 372"/>
  </circle>

  <!-- ORCHESTRATOR core -->
  <g filter="url(#glow)">
    <circle cx="210" cy="218" r="46" fill="url(#coreGrad)" opacity="0.18">
      <animate attributeName="r" values="46;54;46" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="218" r="38" fill="#161b27" stroke="url(#coreGrad)" stroke-width="2.5"/>
  </g>
  <text x="210" y="212" text-anchor="middle" font-size="20">🧠</text>
  <text x="210" y="232" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#f75c7e">ORCHESTRATOR</text>

  <!-- Agent: Planner -->
  <g>
    <rect x="42" y="88" width="96" height="52" rx="12" fill="url(#agentGrad)" stroke="#58a6ff" stroke-width="1.6"/>
    <text x="90" y="112" text-anchor="middle" font-size="15">📋</text>
    <text x="90" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10.5" font-weight="600" fill="#58a6ff">Planner</text>
  </g>

  <!-- Agent: Researcher -->
  <g>
    <rect x="282" y="88" width="96" height="52" rx="12" fill="url(#agentGrad)" stroke="#a855f7" stroke-width="1.6"/>
    <text x="330" y="112" text-anchor="middle" font-size="15">🔍</text>
    <text x="330" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10.5" font-weight="600" fill="#c084fc">Researcher</text>
  </g>

  <!-- Agent: Coder -->
  <g>
    <rect x="20" y="272" width="96" height="52" rx="12" fill="url(#agentGrad)" stroke="#3fb950" stroke-width="1.6"/>
    <text x="68" y="296" text-anchor="middle" font-size="15">💻</text>
    <text x="68" y="314" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10.5" font-weight="600" fill="#3fb950">Coder</text>
  </g>

  <!-- Agent: Critic -->
  <g>
    <rect x="304" y="272" width="96" height="52" rx="12" fill="url(#agentGrad)" stroke="#f0883e" stroke-width="1.6"/>
    <text x="352" y="296" text-anchor="middle" font-size="15">🛡️</text>
    <text x="352" y="314" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10.5" font-weight="600" fill="#f0883e">Critic</text>
  </g>

  <!-- Memory / Tools bar -->
  <g>
    <rect x="140" y="352" width="140" height="44" rx="12" fill="url(#agentGrad)" stroke="#f75c7e" stroke-width="1.6"/>
    <text x="210" y="371" text-anchor="middle" font-size="13">🗄️ ⚙️</text>
    <text x="210" y="388" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#e6edf3">Memory · Tools · MCP</text>
  </g>

  <!-- footer -->
  <text x="210" y="424" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#7d8590">while task.incomplete(): agents.collaborate()</text>
</svg>
